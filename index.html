  // Get today's date as default
  var today = new Date();
  var todayString = today.toISOString().split('T')[0];

  // Initialize with today's date
  document.addEventListener('DOMContentLoaded', function() {
    var dateInput = document.getElementById('harvestDate');
    dateInput.value = todayString;
    updateVegetables();
    
    dateInput.addEventListener('change', updateVegetables);
  });

  function updateVegetables() {
    var dateInput = document.getElementById('harvestDate');
    var selectedDate = new Date(dateInput.value);
    var month = selectedDate.getMonth(); // 0-11

    var vegetables = byMonth[month];
    var container = document.getElementById('vegetableContainer');
    container.innerHTML = '';

    var monthNames = ["January", "February", "March", "April", "May", "June",
      "July", "August", "September", "October", "November", "December"];
    
    var heading = document.createElement('h2');
    heading.textContent = monthNames[month] + ' Vegetables';
    container.appendChild(heading);

    var cardsContainer = document.createElement('div');
    cardsContainer.className = 'cards-grid';

    vegetables.forEach(function(vegetable) {
      var card = createVegetableCard(vegetable, selectedDate);
      cardsContainer.appendChild(card);
    });

    container.appendChild(cardsContainer);
  }

  function createVegetableCard(vegetable, plantDate) {
    var card = document.createElement('div');
    card.className = 'vegetable-card';
    
    var name = document.createElement('h3');
    name.textContent = vegetable.name.charAt(0).toUpperCase() + vegetable.name.slice(1);
    card.appendChild(name);

    var spacing = document.createElement('p');
    spacing.innerHTML = '<strong>Spacing:</strong> ' + vegetable.spaceCm + ' cm';
    card.appendChild(spacing);

    // Calculate harvest dates
    var minHarvestDate = new Date(plantDate);
    minHarvestDate.setDate(minHarvestDate.getDate() + vegetable.harvestDays.min);
    
    var maxHarvestDate = new Date(plantDate);
    maxHarvestDate.setDate(maxHarvestDate.getDate() + vegetable.harvestDays.max);
    
    var formatDate = function(date) {
      var months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      return months[date.getMonth()] + ' ' + date.getDate();
    };

    var harvest = document.createElement('p');
    harvest.innerHTML = '<strong>Harvest:</strong> ' + formatDate(minHarvestDate) + ' - ' + formatDate(maxHarvestDate);
    card.appendChild(harvest);

    return card;
  }

  body {

  .date-selector {

  .cards-grid {
    display: grid;

  .vegetable-card {
    background: white;
    border-radius: 10px;
    padding: 20px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .vegetable-card:hover {
    transform: translateY(-5px);

  }

  .vegetable-card h3 {
    color: #2d5016;

  }

  .vegetable-card p {
    color: #333;
    margin-bottom: 10px;
    line-height: 1.6;
  }

  .vegetable-card strong {
    color: #4a7c2f;
  }
</style>

<script>
  // Get today's date as default
  var today = new Date();
  var todayString = today.toISOString().split('T')[0];

  // Initialize with today's date
  document.addEventListener('DOMContentLoaded', function() {
    var dateInput = document.getElementById('harvestDate');
    var climateSelect = document.getElementById('climateZone');
    dateInput.value = todayString;
    updateZoneImage();
    updateVegetables();
    
    dateInput.addEventListener('change', updateVegetables);
    climateSelect.addEventListener('change', function() {
      updateZoneImage();
      updateVegetables();
    });
  });

  function updateVegetables() {
    var dateInput = document.getElementById('harvestDate');
    var climateSelect = document.getElementById('climateZone');
    var selectedDate = new Date(dateInput.value);
    var month = selectedDate.getMonth(); // 0-11
    var climateZone = climateSelect.value;

    var byMonth = climateZone === 'warm' ? warmByMonth : coolByMonth;
    var vegetables = byMonth[month];
    var container = document.getElementById('vegetableContainer');
    container.innerHTML = '';

    var monthNames = ["January", "February", "March", "April", "May", "June",
      "July", "August", "September", "October", "November", "December"];
    
    var heading = document.createElement('h2');
    heading.textContent = monthNames[month] + ' Vegetables (' + climateZone.charAt(0).toUpperCase() + climateZone.slice(1) + ' Climate)';
    container.appendChild(heading);

    var cardsContainer = document.createElement('div');
    cardsContainer.className = 'cards-grid';

    vegetables.forEach(function(vegetable) {
      var card = createVegetableCard(vegetable, selectedDate);
      cardsContainer.appendChild(card);
    });

    container.appendChild(cardsContainer);
  }

  function updateZoneImage() {
    var climateSelect = document.getElementById('climateZone');
    var zoneImage = document.getElementById('zoneImage');
    var climateZone = climateSelect.value;
    zoneImage.src = 'assets/images/zones/' + climateZone + '.png';
    zoneImage.alt = climateZone.charAt(0).toUpperCase() + climateZone.slice(1) + ' Climate Zone Map';
  }

  function resetDateToToday() {
    var dateInput = document.getElementById('harvestDate');
    dateInput.value = todayString;
    updateVegetables();
  }

  function createVegetableCard(vegetable, plantDate) {
    var card = document.createElement('div');
    card.className = 'vegetable-card';

    var image = document.createElement('img');
    var imageName = vegetable.name.toLowerCase();
    image.src = 'assets/images/vegetables/' + imageName + '.webp';
    image.alt = vegetable.name + ' image';
    card.appendChild(image);

    var body = document.createElement('div');
    body.className = 'card-body';

    var name = document.createElement('h3');
    name.textContent = titlecase(vegetable.name);
    body.appendChild(name);

    var category = document.createElement('p');
    category.innerHTML = '(' + titlecase(vegetable.category) + ')';
    body.appendChild(category);

    var spacing = document.createElement('p');
    spacing.innerHTML = '<strong>Spacing:</strong> ' + vegetable.spaceCm + ' cm';
    body.appendChild(spacing);

    // Calculate harvest dates
    var minHarvestDate = new Date(plantDate);
    minHarvestDate.setDate(minHarvestDate.getDate() + vegetable.harvestDays.min);
    
    var maxHarvestDate = new Date(plantDate);
    maxHarvestDate.setDate(maxHarvestDate.getDate() + vegetable.harvestDays.max);
    
    var formatDate = function(date) {
      var months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      return months[date.getMonth()] + ' ' + date.getDate();
    };

    var harvest = document.createElement('p');
    harvest.innerHTML = '<strong>Harvest:</strong> ' + formatDate(minHarvestDate) + ' - ' + formatDate(maxHarvestDate);
    body.appendChild(harvest);

    card.appendChild(body);

    return card;
  }

  function titlecase(str) {
    return str.split(' ').map(function(word) {
      return word.charAt(0).toUpperCase() + word.slice(1);
    }).join(' ');
  }
</script>
